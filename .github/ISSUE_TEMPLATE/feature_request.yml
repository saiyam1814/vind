name: Feature Request
description: Suggest a feature or improvement for vind
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Since vind's core code lives in the
        [vCluster repository](https://github.com/loft-sh/vcluster), feature requests
        that involve core changes may need to be filed there instead.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: What problem does this feature solve? What are you trying to do?
      placeholder: I'm trying to... but currently...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of vind does this relate to?
      options:
        - Cluster creation / lifecycle
        - Networking / Load Balancers
        - External nodes
        - Platform UI
        - Sleep / Wake
        - Registry proxy / Image caching
        - CI/CD integration
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or examples.
